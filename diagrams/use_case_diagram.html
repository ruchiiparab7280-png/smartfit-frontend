    text-transform: uppercase;
  }
  .subtitle {

  #diagram-svg {

  }

  /* ── Below-diagram section ── */

  }

  /* External systems row */

    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: 6px;
    padding: 6px 20px;
    border: 2px solid #000;
    border-radius: 8px;

  .ext-box {

    font-size: 12pt;
    font-weight: 700;
    text-align: center;
  }
  .ext-label {
    font-size: 9pt;
    color: #444;
    font-style: italic;
    text-align: center;
    margin-top: 2px;
  }
  .ext-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .ext-uses {
    font-size: 9pt;
    color: #333;
    font-style: italic;
    align-self: center;
  }

  /* Legend row */
  .legend {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 8px;
    padding: 6px 14px;
    background: #f5f5f5;
    border: 1px solid #bbb;
    border-radius: 6px;
    font-size: 10pt;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;

  }
  .leg-solid {

  }
  .leg-dashed {
    width: 32px; height: 2px;
    background: repeating-linear-gradient(to right, #000 0, #000 5px, transparent 5px, transparent 9px);
    display: inline-block;
  }
  .leg-ellipse {
    display: inline-block;
    width: 52px; height: 18px;
    border: 2px solid #000;
    border-radius: 50%;
    text-align: center;
    font-size: 8pt;
    line-height: 14px;
  }
  .leg-actor {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .leg-actor-head {
    width: 12px; height: 12px;

  }
  .leg-actor-body {
    width: 2px; height: 10px; background: #000;
  }

    border: 2px solid #000;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 8pt;

    background: #000;
    color: #fff;

    font-weight: 700;

<script>
function downloadDiagram() {
  const svg = document.getElementById('diagram-svg');
  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  const scale = 3; // high resolution
  const vb = svg.viewBox.baseVal;
  canvas.width  = vb.width  * scale;
  canvas.height = vb.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const img = new Image();
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  img.onload = function () {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'smartfit_use_case_diagram.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}
</script>
