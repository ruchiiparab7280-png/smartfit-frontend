<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SmartFit – UML Use Case Diagram</title>
<style>
  @page { size: A4 portrait; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    width: 210mm;
    min-height: 297mm;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #000;
    padding: 8mm 6mm 8mm 6mm;
  }
  h1 {
    text-align: center;
    font-size: 20pt;
    font-weight: 900;
    color: #000;
    letter-spacing: 2px;
    margin-bottom: 2mm;
    text-transform: uppercase;
  }
  .subtitle {
    text-align: center;
    font-size: 10pt;
    color: #333;
    margin-bottom: 4mm;
    letter-spacing: 1px;
  }
  svg {
    display: block;
    margin: 0 auto;
    width: 198mm;
    height: auto;
  }
</style>
</head>
<body>

<h1>SmartFit — UML Use Case Diagram</h1>
<div class="subtitle">Gym Management &amp; Fitness Platform</div>

<svg viewBox="0 0 780 900" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#000" stroke-width="1.8"/>
    </marker>
  </defs>

  <!-- ============================================================
       SYSTEM BOUNDARY
  ============================================================ -->
  <rect x="148" y="8" width="484" height="850"
        fill="none" stroke="#000" stroke-width="3" rx="10"/>
  <text x="390" y="30" text-anchor="middle"
        font-size="16" font-weight="900" fill="#000" letter-spacing="1">
    SmartFit System
  </text>

  <!-- ============================================================
       LEFT ACTORS  — User (top-left), Gym Owner (bottom-left)
  ============================================================ -->

  <!-- USER -->
  <circle cx="60" cy="160" r="18" fill="none" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="178" x2="60" y2="224" stroke="#000" stroke-width="2.5"/>
  <line x1="32" y1="200" x2="88" y2="200" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="224" x2="36" y2="252" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="224" x2="84" y2="252" stroke="#000" stroke-width="2.5"/>
  <text x="60" y="270" text-anchor="middle" font-size="14" font-weight="800" fill="#000">User</text>

  <!-- GYM OWNER -->
  <circle cx="60" cy="560" r="18" fill="none" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="578" x2="60" y2="624" stroke="#000" stroke-width="2.5"/>
  <line x1="32" y1="600" x2="88" y2="600" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="624" x2="36" y2="652" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="624" x2="84" y2="652" stroke="#000" stroke-width="2.5"/>
  <text x="60" y="670" text-anchor="middle" font-size="14" font-weight="800" fill="#000">Gym Owner</text>

  <!-- ============================================================
       RIGHT ACTORS — Admin (top-right), External systems (bottom-right)
  ============================================================ -->

  <!-- ADMIN -->
  <circle cx="720" cy="160" r="18" fill="none" stroke="#000" stroke-width="2.5"/>
  <line x1="720" y1="178" x2="720" y2="224" stroke="#000" stroke-width="2.5"/>
  <line x1="692" y1="200" x2="748" y2="200" stroke="#000" stroke-width="2.5"/>
  <line x1="720" y1="224" x2="696" y2="252" stroke="#000" stroke-width="2.5"/>
  <line x1="720" y1="224" x2="744" y2="252" stroke="#000" stroke-width="2.5"/>
  <text x="720" y="270" text-anchor="middle" font-size="14" font-weight="800" fill="#000">Admin</text>

  <!-- ============================================================
       EXTERNAL SYSTEMS (outside boundary, bottom)
  ============================================================ -->
  <rect x="168" y="868" width="100" height="28" rx="6" fill="none" stroke="#000" stroke-width="2"/>
  <text x="218" y="887" text-anchor="middle" font-size="11" font-weight="700" fill="#000">Razorpay</text>

  <rect x="512" y="868" width="110" height="28" rx="6" fill="none" stroke="#000" stroke-width="2"/>
  <text x="567" y="887" text-anchor="middle" font-size="11" font-weight="700" fill="#000">Email Service</text>

  <!-- ============================================================
       SECTION LABELS
  ============================================================ -->
  <text x="390" y="52" text-anchor="middle" font-size="11" fill="#555" font-style="italic" font-weight="600">── Registered User ──</text>
  <text x="390" y="490" text-anchor="middle" font-size="11" fill="#555" font-style="italic" font-weight="600">── Gym Owner ──</text>
  <text x="390" y="730" text-anchor="middle" font-size="11" fill="#555" font-style="italic" font-weight="600">── Admin ──</text>

  <!-- ============================================================
       USE CASES — USER  (rows 1–4)
  ============================================================ -->

  <!-- Row 1 -->
  <ellipse cx="270" cy="85" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Sign Up</text>

  <ellipse cx="510" cy="85" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Log In</text>

  <!-- Row 2 -->
  <ellipse cx="270" cy="150" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Forgot / Reset Password</text>

  <ellipse cx="510" cy="150" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#000">View User Dashboard</text>

  <!-- Row 3 -->
  <ellipse cx="270" cy="215" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Browse / Search Gyms</text>

  <ellipse cx="510" cy="215" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#000">View Gym Details</text>

  <!-- Row 4 -->
  <ellipse cx="270" cy="280" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Purchase Membership</text>

  <ellipse cx="510" cy="280" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Buy Supplement</text>

  <!-- Row 5 -->
  <ellipse cx="270" cy="345" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Book Free Trial</text>

  <ellipse cx="510" cy="345" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Write Review</text>

  <!-- Row 6 — Process Payment (shared, dashed) -->
  <ellipse cx="390" cy="420" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="390" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Process Payment</text>

  <!-- ============================================================
       USE CASES — GYM OWNER  (rows 7–9)
  ============================================================ -->

  <!-- Row 7 -->
  <ellipse cx="270" cy="520" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="525" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Submit Application</text>

  <ellipse cx="510" cy="520" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="525" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Pay Onboarding Fee</text>

  <!-- Row 8 -->
  <ellipse cx="270" cy="585" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="590" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Manage Gym Details</text>

  <ellipse cx="510" cy="585" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="590" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Manage Trainers</text>

  <!-- Row 9 -->
  <ellipse cx="270" cy="650" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="655" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Manage Memberships</text>

  <ellipse cx="510" cy="650" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="655" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Manage Supplements</text>

  <!-- ============================================================
       USE CASES — ADMIN  (rows 10–11)
  ============================================================ -->

  <!-- Row 10 -->
  <ellipse cx="270" cy="760" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="765" text-anchor="middle" font-size="12" font-weight="700" fill="#000">View Admin Dashboard</text>

  <ellipse cx="510" cy="760" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="765" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Approve / Reject Gym</text>

  <!-- Row 11 -->
  <ellipse cx="270" cy="820" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="270" y="825" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Manage All Users</text>

  <ellipse cx="510" cy="820" rx="108" ry="22" fill="none" stroke="#000" stroke-width="2"/>
  <text x="510" y="825" text-anchor="middle" font-size="12" font-weight="700" fill="#000">View All Payments</text>

  <!-- ============================================================
       ASSOCIATION LINES — USER (left)
  ============================================================ -->
  <line x1="78" y1="152" x2="162" y2="85"  stroke="#000" stroke-width="2"/>
  <line x1="78" y1="158" x2="162" y2="150" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="164" x2="162" y2="215" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="170" x2="162" y2="280" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="176" x2="162" y2="345" stroke="#000" stroke-width="2"/>

  <!-- USER → right UCs -->
  <line x1="78" y1="154" x2="402" y2="85"  stroke="#000" stroke-width="2"/>
  <line x1="78" y1="160" x2="402" y2="150" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="166" x2="402" y2="215" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="172" x2="402" y2="280" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="178" x2="402" y2="345" stroke="#000" stroke-width="2"/>

  <!-- ============================================================
       ASSOCIATION LINES — GYM OWNER (left)
  ============================================================ -->
  <line x1="78" y1="552" x2="162" y2="520" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="558" x2="162" y2="585" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="564" x2="162" y2="650" stroke="#000" stroke-width="2"/>

  <line x1="78" y1="554" x2="402" y2="520" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="560" x2="402" y2="585" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="566" x2="402" y2="650" stroke="#000" stroke-width="2"/>

  <!-- ============================================================
       ASSOCIATION LINES — ADMIN (right)
  ============================================================ -->
  <line x1="702" y1="152" x2="618" y2="760" stroke="#000" stroke-width="2"/>
  <line x1="702" y1="158" x2="618" y2="820" stroke="#000" stroke-width="2"/>

  <line x1="702" y1="154" x2="378" y2="760" stroke="#000" stroke-width="2"/>
  <line x1="702" y1="160" x2="378" y2="820" stroke="#000" stroke-width="2"/>

  <!-- ============================================================
       «include» RELATIONSHIPS
  ============================================================ -->

  <!-- Purchase Membership → Process Payment -->
  <line x1="310" y1="302" x2="350" y2="398" stroke="#000" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#open)"/>
  <text x="280" y="358" font-size="10" fill="#000" font-style="italic">«include»</text>

  <!-- Buy Supplement → Process Payment -->
  <line x1="510" y1="302" x2="450" y2="398" stroke="#000" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#open)"/>
  <text x="510" y="358" font-size="10" fill="#000" font-style="italic">«include»</text>

  <!-- Pay Onboarding Fee → Process Payment -->
  <line x1="510" y1="498" x2="450" y2="442" stroke="#000" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#open)"/>
  <text x="516" y="474" font-size="10" fill="#000" font-style="italic">«include»</text>

  <!-- Forgot/Reset Password → Email Service -->
  <line x1="378" y1="172" x2="567" y2="868" stroke="#000" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="510" y="560" font-size="10" fill="#333" font-style="italic">«uses»</text>

  <!-- Process Payment → Razorpay -->
  <line x1="300" y1="442" x2="218" y2="868" stroke="#000" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="218" y="680" font-size="10" fill="#333" font-style="italic">«uses»</text>

  <!-- ============================================================
       LEGEND
  ============================================================ -->
  <rect x="155" y="854" width="470" height="20" rx="5" fill="#f0f0f0" stroke="#999" stroke-width="1"/>

  <line x1="170" y1="864" x2="200" y2="864" stroke="#000" stroke-width="2"/>
  <text x="204" y="868" font-size="10" fill="#000">Association</text>

  <line x1="278" y1="864" x2="308" y2="864" stroke="#000" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="312" y="868" font-size="10" fill="#000">«include» / «uses»</text>

  <ellipse cx="435" cy="864" rx="26" ry="9" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="435" y="868" text-anchor="middle" font-size="9" fill="#000">Use Case</text>

  <circle cx="512" cy="864" r="7" fill="none" stroke="#000" stroke-width="1.5"/>
  <line x1="512" y1="871" x2="512" y2="877" stroke="#000" stroke-width="1.5"/>
  <line x1="505" y1="874" x2="519" y2="874" stroke="#000" stroke-width="1.5"/>
  <text x="524" y="868" font-size="10" fill="#000">Actor</text>

  <rect x="572" y="857" width="50" height="14" rx="3" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="597" y="868" text-anchor="middle" font-size="9" fill="#000">External</text>

</svg>

</body>
</html>
