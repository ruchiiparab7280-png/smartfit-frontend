<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>SmartFit – DFD Level 0</title>
<style>
  @page { size: A4 portrait; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    width: 210mm;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #000;
    padding: 6mm;
  }
  h1 {
    text-align: center;
    font-size: 18pt;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1mm;
  }
  .subtitle {
    text-align: center;
    font-size: 10pt;
    color: #0e0d0d;
    margin-bottom: 4mm;
  }
  svg {
    display: block;
    margin: 0 auto;
    width: 196mm;
    height: auto;
  }
  .below {
    width: 196mm;
    margin: 0 auto;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
    padding: 6px 14px;
    background: #f5f5f5;
    border: 1px solid #bbb;
    border-radius: 6px;
    font-size: 10pt;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .leg-rect {
    width: 36px; height: 18px;
    border: 2.5px solid #000;
    display: inline-block;
  }
  .leg-circle {
    width: 52px; height: 28px;
    border: 2.5px solid #000;
    border-radius: 50%;
    display: inline-block;
  }
  .leg-dstore {
    display: inline-flex;
    align-items: center;
    width: 52px; height: 18px;
    border-top: 2.5px solid #000;
    border-bottom: 2.5px solid #000;
  }
  .leg-arrow {
    width: 36px; height: 2px;
    background: #000;
    position: relative;
    display: inline-block;
  }
  .leg-arrow::after {
    content: '';
    position: absolute;
    right: 0; top: -4px;
    border: 5px solid transparent;
    border-left: 7px solid #000;
  }
  .download-btn {
    display: block;
    margin: 10px auto 0;
    padding: 8px 28px;
    background: #000;
    color: #fff;
    font-size: 12pt;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .download-btn:hover { background: #333; }
</style>
</head>

<!-- ── BELOW DIAGRAM ── -->
<div class="below">

  <div class="legend">
    <strong>Legend:</strong>
    <div class="legend-item">
      <span class="leg-rect"></span> External Entity
    </div>
    <div class="legend-item">
      <span class="leg-circle"></span> Process (System)
    </div>

      <span class="leg-arrow"></span> Data Flow
    </div>
  </div>

  <button class="download-btn" onclick="downloadDiagram()">⬇ Download as Image</button>
</div>

<script>
function downloadDiagram() {
  const svg = document.getElementById('dfd-svg');
  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  const scale = 3;
  const vb = svg.viewBox.baseVal;
  canvas.width  = vb.width  * scale;
  canvas.height = vb.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const img = new Image();
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  img.onload = function () {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'smartfit_dfd_level0.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}
</script>

</body>
</html>
